name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What gets in the way today?
      placeholder: |
        I'm trying to ... but currently I have to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API sketches / UI mockups welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you didn't pick them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, related issues, prior art in other systems, etc.
