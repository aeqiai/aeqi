name: Quality Gates

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    # Weekly security audit
    - cron: "0 0 * * 0"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # 1. Rust toolchain setup
      - name: Setup Rust toolchain
        id: rust_toolchain
        run: |
          if [ -f rust-toolchain.toml ]; then
            EXPECTED_CHANNEL=$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)
            echo "Installing Rust $EXPECTED_CHANNEL"
            rustup toolchain install "$EXPECTED_CHANNEL" --profile minimal \
              --component clippy \
              --component rustfmt \
              --component rust-src
            rustup default $EXPECTED_CHANNEL
            echo "toolchain=$EXPECTED_CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "No rust-toolchain.toml found, using stable"
            rustup default stable
            echo "toolchain=stable" >> $GITHUB_OUTPUT
          fi
          rustup show
          echo "Rust version: $(rustc --version)"

      # 2. Cache optimization
      - name: Rust cache
        id: rust_cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ runner.os }}-${{ steps.rust_toolchain.outputs.toolchain }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # 3. Cheap gates first — fail fast BEFORE the expensive cargo-install chain.
      #    public-surface-scan (~4s) and rust-strict-lints (fmt + clippy, ~30s
      #    under cache) are the most common failure modes; running them ahead
      #    of the ~3min install step saves 5-10min on the average failing PR.

      # 3a. Public repository surface guard
      - name: Public surface scan
        id: public_surface
        run: |
          echo "=== Checking Public Repository Surface ==="
          scripts/public-surface-scan.sh

      # 3b. Formatting and strict clippy lints
      - name: Rust strict lints
        id: rust_strict_lints
        run: scripts/rust-strict-lints.sh

      # 4. Install quality gate tools (heavy — only runs once the cheap gates pass)
      - name: Install quality gate tools
        id: install_tools
        run: |
          echo "=== Installing Quality Gate Tools ==="

          # Install cargo-audit for security scanning
          echo "Installing cargo-audit..."
          cargo install cargo-audit --locked

          # Install cargo-deny for dependency analysis
          echo "Installing cargo-deny..."
          cargo install cargo-deny --locked

          # Install cargo-udeps for unused dependencies
          echo "Installing cargo-udeps..."
          cargo install cargo-udeps --locked

          # Install additional utilities
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      # 5. JavaScript/TypeScript security scanning (npm audit)
      - name: Setup Node.js
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: JavaScript security audit with npm audit
        id: npm_audit
        run: |
          echo "=== Running JavaScript Security Audit ==="

          # Find npm projects this workspace's CI gates on. Excludes:
          #   - node_modules/        — transitive deps, not our shipped surface.
          #   - ./tmp/               — third-party repos checked out for
          #                            research / trending analysis; we don't
          #                            ship them and their vulns aren't ours.
          #   - dist/, build/, .next/ — generated output occasionally embeds
          #                             package.json copies.
          #   - ./projects/          — sub-projects with their own CI gates
          #                            (currently aeqi-solana whose Anchor
          #                            test deps pull bigint-buffer * which
          #                            has no clean upstream patch — the
          #                            sub-project's own `verify:ci` is the
          #                            right audit boundary for that surface).
          find_npm_projects() {
            find . -name "package.json" -type f \
              -not -path "*/node_modules/*" \
              -not -path "./tmp/*" \
              -not -path "./projects/*" \
              -not -path "*/dist/*" \
              -not -path "*/build/*" \
              -not -path "*/.next/*" \
              | head -10
          }

          npm_projects=$(find_npm_projects)

          if [ -z "$npm_projects" ]; then
            echo "⚠️  No npm projects found. Skipping npm audit."
          else
            echo "Found npm projects:"
            echo "$npm_projects"
            echo ""

            # Install Node.js if not already installed
            if ! command -v npm &> /dev/null; then
              echo "Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            any_vulnerabilities=false

            for project in $npm_projects; do
              project_dir=$(dirname "$project")
              echo "Scanning project: $project_dir"

              cd "$project_dir"

              # Check if package-lock.json exists
              if [ -f "package-lock.json" ]; then
                echo "Running npm audit..."

                # PR gate runs at --audit-level=high so transitive moderate
                # findings in pinned wallet SDKs (axios/uuid/postcss via
                # @coinbase/cdp-sdk, @metamask/sdk, wagmi, @rainbow-me/rainbowkit)
                # don't block unrelated PRs. The weekly cron run still surfaces
                # moderate findings as informational signal — see the
                # `npm audit --audit-level=moderate` echo below.
                if npm audit --audit-level=high; then
                  echo "✅ npm audit passed for $project_dir (high+)"
                  echo "  (informational moderate findings:)"
                  npm audit --audit-level=moderate || true
                else
                  echo "❌ npm audit found high/critical vulnerabilities in $project_dir"
                  any_vulnerabilities=true

                  # Show audit report
                  echo "Audit report:"
                  npm audit --json 2>/dev/null | jq -r '.metadata.vulnerabilities | "  Critical: \(.critical)\n  High: \(.high)\n  Moderate: \(.moderate)\n  Low: \(.low)"' || echo "  Could not generate detailed report"
                fi
              else
                echo "⚠️  No package-lock.json found in $project_dir. Skipping audit."
              fi

              cd - > /dev/null
              echo ""
            done

            if [ "$any_vulnerabilities" = true ]; then
              echo "❌ JavaScript security audit failed - vulnerabilities found"
              echo "Consider running 'npm audit fix' to automatically fix issues"
              exit 1
            fi
          fi
        continue-on-error: false

      # 6. Security vulnerability scanning (cargo-audit)
      - name: Security audit with cargo-audit
        id: cargo_audit
        run: |
          echo "=== Running Security Audit ==="
          cargo audit
        continue-on-error: false

      # 7. Dependency analysis (cargo-deny)
      - name: Dependency analysis with cargo-deny
        id: cargo_deny
        run: |
          echo "=== Running Dependency Analysis ==="
          cargo deny check
        continue-on-error: false

      # 8. Unused dependency detection (cargo-udeps)
      - name: Unused dependency detection with cargo-udeps
        id: cargo_udeps
        run: |
          echo "=== Checking for Unused Dependencies ==="
          # Install nightly toolchain for cargo-udeps
          rustup toolchain install nightly --profile minimal --component rust-src
          cargo +nightly udeps --workspace --all-targets
        continue-on-error: false

      # 9. Build verification
      - name: Build verification
        id: build
        run: |
          echo "=== Building Workspace ==="
          cargo build --workspace --verbose

      # 10. Test execution
      - name: Run tests
        id: tests
        run: |
          echo "=== Running Tests ==="
          cargo test --workspace --verbose

      # 11. Documentation generation
      - name: Generate documentation
        id: docs
        run: |
          echo "=== Generating Documentation ==="
          cargo doc --workspace --no-deps --document-private-items

      - name: Upload documentation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: ./target/doc/
          retention-days: 30

      # 12. Summary — success path. Only fires when every preceding step passed.
      - name: Quality gates summary (success)
        if: success()
        run: |
          echo "=== QUALITY GATES SUMMARY ==="
          echo "✅ Public surface scan"
          echo "✅ Rust strict lints: fmt + clippy all targets/features"
          echo "✅ JavaScript security audit: npm audit"
          echo "✅ Security audit: cargo-audit"
          echo "✅ Dependency analysis: cargo-deny"
          echo "✅ Unused dependencies: cargo-udeps (nightly)"
          echo "✅ Build verification"
          echo "✅ Test execution"
          echo "✅ Documentation generation"
          echo ""
          echo "All quality gates completed successfully!"
          echo "Coverage (cargo-tarpaulin) runs weekly via the code-coverage job."
          echo "=========================================="

      # 13. Summary — failure path. Names the step(s) that actually died so the
      #     log surface and check-list both reflect ground truth instead of a
      #     blanket "all gates passed" message printed by an `if: always()` step.
      - name: Quality gates summary (failure)
        if: failure()
        run: |
          echo "=== QUALITY GATES FAILED ==="
          echo ""
          echo "Step conclusions:"
          echo "  checkout              : ${{ steps.checkout.conclusion }}"
          echo "  rust_toolchain        : ${{ steps.rust_toolchain.conclusion }}"
          echo "  rust_cache            : ${{ steps.rust_cache.conclusion }}"
          echo "  public_surface        : ${{ steps.public_surface.conclusion }}"
          echo "  rust_strict_lints     : ${{ steps.rust_strict_lints.conclusion }}"
          echo "  install_tools         : ${{ steps.install_tools.conclusion }}"
          echo "  setup_node            : ${{ steps.setup_node.conclusion }}"
          echo "  npm_audit             : ${{ steps.npm_audit.conclusion }}"
          echo "  cargo_audit           : ${{ steps.cargo_audit.conclusion }}"
          echo "  cargo_deny            : ${{ steps.cargo_deny.conclusion }}"
          echo "  cargo_udeps           : ${{ steps.cargo_udeps.conclusion }}"
          echo "  build                 : ${{ steps.build.conclusion }}"
          echo "  tests                 : ${{ steps.tests.conclusion }}"
          echo "  docs                  : ${{ steps.docs.conclusion }}"
          echo ""
          echo "Failed step(s):"
          fail=0
          for pair in \
            "checkout:${{ steps.checkout.conclusion }}" \
            "rust_toolchain:${{ steps.rust_toolchain.conclusion }}" \
            "rust_cache:${{ steps.rust_cache.conclusion }}" \
            "public_surface:${{ steps.public_surface.conclusion }}" \
            "rust_strict_lints:${{ steps.rust_strict_lints.conclusion }}" \
            "install_tools:${{ steps.install_tools.conclusion }}" \
            "setup_node:${{ steps.setup_node.conclusion }}" \
            "npm_audit:${{ steps.npm_audit.conclusion }}" \
            "cargo_audit:${{ steps.cargo_audit.conclusion }}" \
            "cargo_deny:${{ steps.cargo_deny.conclusion }}" \
            "cargo_udeps:${{ steps.cargo_udeps.conclusion }}" \
            "build:${{ steps.build.conclusion }}" \
            "tests:${{ steps.tests.conclusion }}" \
            "docs:${{ steps.docs.conclusion }}"; do
            name="${pair%%:*}"
            outcome="${pair##*:}"
            if [ "$outcome" = "failure" ]; then
              echo "  ❌ $name"
              fail=$((fail + 1))
            fi
          done
          if [ "$fail" -eq 0 ]; then
            echo "  (no per-step failure recorded — job likely cancelled or timed out)"
          fi
          echo ""
          echo "=========================================="
          exit 1

  # Code coverage — heaviest single check (~5-10min). Pulled out of the
  # PR-blocking job because coverage is a trend signal, not a merge gate.
  # Runs weekly via the same cron the security audit uses, and on-demand
  # via workflow_dispatch. Does NOT run on pull_request or workflow_call.
  code-coverage:
    name: Code coverage (cargo-tarpaulin)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        id: rust_toolchain
        run: |
          if [ -f rust-toolchain.toml ]; then
            EXPECTED_CHANNEL=$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)
            echo "Installing Rust $EXPECTED_CHANNEL"
            rustup toolchain install "$EXPECTED_CHANNEL" --profile minimal \
              --component clippy \
              --component rustfmt \
              --component rust-src
            rustup default $EXPECTED_CHANNEL
            echo "toolchain=$EXPECTED_CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "No rust-toolchain.toml found, using stable"
            rustup default stable
            echo "toolchain=stable" >> $GITHUB_OUTPUT
          fi
          rustup show

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ runner.os }}-${{ steps.rust_toolchain.outputs.toolchain }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Code coverage with cargo-tarpaulin
        run: |
          echo "=== Measuring Code Coverage ==="
          cargo tarpaulin --workspace --out Lcov --output-dir ./coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 30
