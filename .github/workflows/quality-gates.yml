name: Quality Gates

on:
  workflow_call:
  pull_request:
    branches: [main]
  schedule:
    # Weekly security audit
    - cron: '0 0 * * 0'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Rust toolchain setup
      - name: Setup Rust toolchain
        id: rust_toolchain
        run: |
          if [ -f rust-toolchain.toml ]; then
            EXPECTED_CHANNEL=$(grep -oP 'channel\s*=\s*"\K[^"]+' rust-toolchain.toml)
            echo "Installing Rust $EXPECTED_CHANNEL"
            rustup toolchain install "$EXPECTED_CHANNEL" --profile minimal \
              --component clippy \
              --component rustfmt \
              --component rust-src
            rustup default $EXPECTED_CHANNEL
            echo "toolchain=$EXPECTED_CHANNEL" >> $GITHUB_OUTPUT
          else
            echo "No rust-toolchain.toml found, using stable"
            rustup default stable
            echo "toolchain=stable" >> $GITHUB_OUTPUT
          fi
          rustup show
          echo "Rust version: $(rustc --version)"

      # 2. Cache optimization
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-cache-${{ runner.os }}-${{ steps.rust_toolchain.outputs.toolchain }}"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # 3. Install quality gate tools
      - name: Install quality gate tools
        run: |
          echo "=== Installing Quality Gate Tools ==="
          
          # Install cargo-audit for security scanning
          echo "Installing cargo-audit..."
          cargo install cargo-audit --locked
          
          # Install cargo-deny for dependency analysis
          echo "Installing cargo-deny..."
          cargo install cargo-deny --locked
          
          # Install cargo-udeps for unused dependencies
          echo "Installing cargo-udeps..."
          cargo install cargo-udeps --locked
          
          # Install cargo-tarpaulin for code coverage
          echo "Installing cargo-tarpaulin..."
          cargo install cargo-tarpaulin --locked

          # Install additional utilities
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      # 4. JavaScript/TypeScript security scanning (npm audit)
      - name: JavaScript security audit with npm audit
        run: |
          echo "=== Running JavaScript Security Audit ==="
          
          # Find npm projects
          find_npm_projects() {
            find . -name "package.json" -type f | grep -v node_modules | head -10
          }
          
          npm_projects=$(find_npm_projects)
          
          if [ -z "$npm_projects" ]; then
            echo "⚠️  No npm projects found. Skipping npm audit."
          else
            echo "Found npm projects:"
            echo "$npm_projects"
            echo ""
            
            # Install Node.js if not already installed
            if ! command -v npm &> /dev/null; then
              echo "Installing Node.js..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
            
            any_vulnerabilities=false
            
            for project in $npm_projects; do
              project_dir=$(dirname "$project")
              echo "Scanning project: $project_dir"
              
              cd "$project_dir"
              
              # Check if package-lock.json exists
              if [ -f "package-lock.json" ]; then
                echo "Running npm audit..."
                
                # PR gate runs at --audit-level=high so transitive moderate
                # findings in pinned wallet SDKs (axios/uuid/postcss via
                # @coinbase/cdp-sdk, @metamask/sdk, wagmi, @rainbow-me/rainbowkit)
                # don't block unrelated PRs. The weekly cron run still surfaces
                # moderate findings as informational signal — see the
                # `npm audit --audit-level=moderate` echo below.
                if npm audit --audit-level=high; then
                  echo "✅ npm audit passed for $project_dir (high+)"
                  echo "  (informational moderate findings:)"
                  npm audit --audit-level=moderate || true
                else
                  echo "❌ npm audit found high/critical vulnerabilities in $project_dir"
                  any_vulnerabilities=true
                  
                  # Show audit report
                  echo "Audit report:"
                  npm audit --json 2>/dev/null | jq -r '.metadata.vulnerabilities | "  Critical: \(.critical)\n  High: \(.high)\n  Moderate: \(.moderate)\n  Low: \(.low)"' || echo "  Could not generate detailed report"
                fi
              else
                echo "⚠️  No package-lock.json found in $project_dir. Skipping audit."
              fi
              
              cd - > /dev/null
              echo ""
            done
            
            if [ "$any_vulnerabilities" = true ]; then
              echo "❌ JavaScript security audit failed - vulnerabilities found"
              echo "Consider running 'npm audit fix' to automatically fix issues"
              exit 1
            fi
          fi
        continue-on-error: false

      # 5. Security vulnerability scanning (cargo-audit)
      - name: Security audit with cargo-audit
        run: |
          echo "=== Running Security Audit ==="
          cargo audit
        continue-on-error: false

      # 6. Dependency analysis (cargo-deny)
      - name: Dependency analysis with cargo-deny
        run: |
          echo "=== Running Dependency Analysis ==="
          cargo deny check
        continue-on-error: false

      # 7. Unused dependency detection (cargo-udeps)
      - name: Unused dependency detection with cargo-udeps
        run: |
          echo "=== Checking for Unused Dependencies ==="
          # Install nightly toolchain for cargo-udeps
          rustup toolchain install nightly --profile minimal --component rust-src
          cargo +nightly udeps --workspace --all-targets
        continue-on-error: false

      # 8. Code formatting check
      - name: Code formatting check
        run: |
          echo "=== Checking Code Format ==="
          cargo fmt --check --all

      # 9. Linting with clippy
      - name: Linting with clippy
        run: |
          echo "=== Running Clippy Lints ==="
          cargo clippy --workspace -- -D warnings

      # 10. Build verification
      - name: Build verification
        run: |
          echo "=== Building Workspace ==="
          cargo build --workspace --verbose

      # 11. Test execution
      - name: Run tests
        run: |
          echo "=== Running Tests ==="
          cargo test --workspace --verbose

      # 12. Code coverage with cargo-tarpaulin
      - name: Code coverage with cargo-tarpaulin
        run: |
          echo "=== Measuring Code Coverage ==="
          cargo tarpaulin --workspace --out Lcov --output-dir ./coverage
        continue-on-error: false

      # 13. Documentation generation
      - name: Generate documentation
        run: |
          echo "=== Generating Documentation ==="
          cargo doc --workspace --no-deps --document-private-items

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/
          retention-days: 30

      - name: Upload documentation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: ./target/doc/
          retention-days: 30

      # 14. Summary report
      - name: Generate quality gate summary
        if: always()
        run: |
          echo "=== QUALITY GATES SUMMARY ==="
          echo "✅ JavaScript security audit: npm audit"
          echo "✅ Security audit: cargo-audit"
          echo "✅ Dependency analysis: cargo-deny"
          echo "✅ Unused dependencies: cargo-udeps (nightly)"
          echo "✅ Code formatting: cargo fmt"
          echo "✅ Linting: cargo clippy"
          echo "✅ Build verification"
          echo "✅ Test execution"
          echo "✅ Code coverage: cargo-tarpaulin"
          echo "✅ Documentation generation"
          echo ""
          echo "All quality gates completed successfully!"
          echo "=========================================="
