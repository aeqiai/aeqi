name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show # reads rust-toolchain.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - uses: Swatinem/rust-cache@v2

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: UI install
        run: npm --prefix apps/ui ci

      - name: UI build
        run: npm --prefix apps/ui run build

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Format check
        run: cargo fmt --check
