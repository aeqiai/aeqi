name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show # reads rust-toolchain.toml
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - uses: Swatinem/rust-cache@v2

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      # ── Frontend ──────────────────────────────────
      - name: UI install
        run: npm --prefix apps/ui ci

      - name: UI check (tsc + prettier)
        run: npm --prefix apps/ui run check

      - name: UI lint (eslint)
        run: npm --prefix apps/ui run lint

      - name: UI test (vitest — smoke + unit)
        run: npm --prefix apps/ui test

      - name: UI build
        run: npm --prefix apps/ui run build

      # ── Backend ───────────────────────────────────
      # Baileys bridge deps — aeqi-gates tests boot the Node bridge as a
      # subprocess and assert on its ready event, so node_modules has to
      # exist before the Rust test layer runs.
      - name: Baileys bridge install
        run: npm --prefix bridges/baileys ci

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust clippy (workspace)
        run: cargo clippy --workspace -- -D warnings

      - name: Rust build
        run: cargo build --workspace

      - name: Rust tests
        run: cargo test --workspace
