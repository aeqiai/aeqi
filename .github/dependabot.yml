version: 2
updates:
  # Rust workspace — all crates share the root Cargo.toml
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      rust-minor-and-patch:
        update-types:
          - minor
          - patch

  # UI — main frontend
  - package-ecosystem: npm
    directory: "/apps/ui"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      ui-minor-and-patch:
        update-types:
          - minor
          - patch

  # Root package.json — dev tooling (playwright, scripts)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # GitHub Actions workflows themselves
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
