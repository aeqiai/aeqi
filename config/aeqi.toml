[aeqi]
name = "aeqi"
data_dir = "~/.aeqi"

[web]
enabled = true
bind = "127.0.0.1:8400"
ui_dist_dir = "/home/claudedev/aeqi/apps/ui/dist"
cors_origins = ["https://aeqi.ai", "https://app.aeqi.ai", "http://localhost:5173"]
auth_secret = "${AEQI_WEB_SECRET}"

[web.auth]
mode = "none"
base_url = "https://aeqi.ai"
waitlist = true
invite_codes_per_user = 3

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "google/gemma-4-27b-it:free"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
temporal_decay_halflife_days = 30

[hosting]
provider = "local"

[hosting.local]
nginx_available_dir = "/etc/nginx/sites-available"
nginx_enabled_dir = "/etc/nginx/sites-enabled"
certbot_bin = "certbot"
certbot_email = "hello@aeqi.ai"
port_range_start = 3100
port_range_end = 3999
state_file = "/var/lib/aeqi/hosting.json"

[orchestrator]
background_automation_enabled = false
