# AEQI Port Registry — single source of truth
# All port assignments on this server are documented here.
# When adding a new service, claim a port here first.

[system]
# Managed by the OS / infrastructure, don't touch
http = 80
https = 443
smtp = 25          # postfix, localhost only
dns = 53           # systemd-resolved

[aeqi]
daemon = 8400      # aeqi runtime (web + API)
platform = 8443    # aeqi-platform (SaaS control plane)
# Host runtimes get ports from the range below
host_range_start = 8500
host_range_end = 8599

[infrastructure]
redis = 6379
plausible = 8000   # Docker, internal only
prometheus_node = 9100

[reserved]
# Ports previously used by on-hold projects.
# Do NOT reuse without checking projects/ configs.
# algostaking_api = 8082
# algostaking_stream = 8081
# algostaking_services = 9000-9016
# algostaking_zmq = 5553-5583
