[platform]
name = "gacha-agency"
base_dir = "/data/tenants"
template_dir = "/data/templates"
max_global_workers = 50
max_global_cost_per_day_usd = 100.0
jwt_secret = "${GACHA_JWT_SECRET}"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"

[web]
bind = "0.0.0.0:8420"
cors_origins = ["https://gacha.agency", "https://app.gacha.agency", "http://localhost:3100"]

[tiers.free]
max_companions = 5
max_projects = 1
max_workers = 1
max_cost_per_day_usd = 1.0
max_storage_mb = 500
can_execute_code = false
model = "xiaomi/mimo-v2-pro"
summons_per_day = 3
mana_per_day = 10

[tiers.basic]
max_companions = 25
max_projects = 3
max_workers = 2
max_cost_per_day_usd = 5.0
max_storage_mb = 5000
can_execute_code = true
model = "xiaomi/mimo-v2-pro"
summons_per_day = 15
mana_per_day = 100

[tiers.pro]
max_companions = 100
max_projects = 10
max_workers = 5
max_cost_per_day_usd = 20.0
max_storage_mb = 50000
can_execute_code = true
model = "xiaomi/mimo-v2-pro"
summons_per_day = 50
mana_per_day = 500
