# cargo-deny configuration

[advisories]
unmaintained = "workspace"
unsound = "all"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BUSL-1.1",
    "CDLA-Permissive-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unlicense",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = []
skip-tree = []

[sources]
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
unknown-registry = "deny"
unknown-git = "deny"
