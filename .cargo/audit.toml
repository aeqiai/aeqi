# cargo-audit configuration. The CI step (`cargo audit`) reads this in
# addition to its hard-coded checks. Each ignored advisory has a parallel
# entry in `deny.toml` (cargo-deny's [advisories] table) — keep them in
# sync when adding or clearing.

[advisories]
ignore = [
    # bincode 1.3.x unmaintained, transitive via syntect, no CVE.
    "RUSTSEC-2025-0141",
    # rsa 0.9.x Marvin timing sidechannel, transitive via jsonwebtoken.
    # No upstream fix; attack surface (RSA private-key decryption) is
    # not reachable in our usage — jsonwebtoken uses RSA only for
    # signature verification (public-key path). See deny.toml for the
    # full rationale.
    "RUSTSEC-2023-0071",
]
