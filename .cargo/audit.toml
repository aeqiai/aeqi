# cargo-audit configuration. The CI step (`cargo audit`) reads this in
# addition to its hard-coded checks. Each ignored advisory has a parallel
# entry in `deny.toml` (cargo-deny's [advisories] table) — keep them in
# sync when adding or clearing.

[advisories]
ignore = [
    # bincode 1.3.x unmaintained, transitive via syntect, no CVE.
    "RUSTSEC-2025-0141",
]
